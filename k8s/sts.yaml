apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
data:
  init-user.js: |
    db = db.getSiblingDB("namegen");
    db.createUser({
      user: "genuser",
      pwd: "password",
      roles: [
        {
          role: "readWrite",
          db: "namegen"
        }
      ]
    });

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:3.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongodb-init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mongodb-init-script
          configMap:
            name: mongodb-init-script
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        storageClassName: auto-ebs-sc
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017